<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Приглашение на прогулку | Вторник 💫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e4 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-wrapper {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255, 200, 210, 0.6);
            text-align: center;
        }

        .step {
            animation: fadeSlide 0.45s ease-out;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-size: 1.9rem;
            color: #b34e6e;
            margin-bottom: 1.2rem;
            font-weight: 650;
        }

        .greeting-text {
            font-size: 1.25rem;
            color: #b55b78;
            margin-bottom: 2rem;
            background: #fff1f4;
            display: inline-block;
            padding: 10px 24px;
            border-radius: 60px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 1.8rem 0 0.8rem;
        }

        .btn {
            border: none;
            padding: 14px 28px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-primary {
            background: #f5a9bf;
            color: white;
            box-shadow: 0 8px 18px rgba(245, 169, 191, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-danger {
            background: #e9ced6;
            color: #a55b72;
            transition: all 0.12s ease;
        }

        .btn-danger:active {
            transform: scale(0.85) !important;
            background: #e0b8c4 !important;
            opacity: 0.7;
        }

        .btn-danger:hover {
            transform: scale(0.88);
            background: #dfc0ca;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.4rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 650;
            color: #b55c7a;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 34px;
            border: 1.5px solid #ffd0de;
            background: white;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #f3a1ba;
            box-shadow: 0 0 0 3px rgba(243, 161, 186, 0.2);
        }

        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%23b85c7a" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 18px center;
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 12px;
            background: #e683a2;
            color: white;
            font-size: 1.2rem;
            padding: 14px;
            border: none;
        }

        .final-heart {
            font-size: 4rem;
            margin-bottom: 0.8rem;
            animation: gentleFloat 2s infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .final-text {
            font-size: 1.35rem;
            font-weight: 500;
            color: #b5476b;
            margin: 20px 0;
            line-height: 1.4;
        }

        .hearts-bg {
            position: relative;
            margin-top: 1rem;
            min-height: 90px;
        }

        @keyframes floatUpHeart {
            from {
                transform: translateY(0) rotate(0deg);
                opacity: 0.9;
            }
            to {
                transform: translateY(-320px) rotate(15deg);
                opacity: 0;
            }
        }

        .subnote {
            font-size: 0.7rem;
            margin-top: 20px;
            color: #cb8b9e;
        }

        @media (max-width: 550px) {
            .card {
                padding: 1.6rem;
            }
            h2 {
                font-size: 1.6rem;
            }
            .final-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="card">
        <!-- ШАГ 1 -->
        <div id="step1" class="step">
            <h2>Привет! ❤️</h2>
            <div class="greeting-text">Го гулять во вторник? 🚶‍♀️🌳</div>
            <div class="button-group">
                <button id="yesBtn" class="btn btn-primary">Да, с радостью!</button>
                <button id="noBtn" class="btn btn-danger">Нет, я не могу</button>
            </div>
            <div class="subnote">💫 Вторник — идеальный день для прогулки</div>
        </div>

        <!-- ШАГ 2 -->
        <div id="step2" class="step" style="display: none;">
            <h2>Ура! 🎉 Выбираем идеальный маршрут:</h2>
            <form id="dateForm">
                <div class="form-group">
                    <label>🕒 Удобное время</label>
                    <input type="time" name="time" value="17:00" required>
                </div>
                <div class="form-group">
                    <label>📍 Куда пойдём?</label>
                    <input type="text" name="place" placeholder="Например: парк, набережная, центр..." required>
                </div>
                <div class="form-group">
                    <label>🚶‍♀️ Длительность прогулки</label>
                    <select name="duration" required>
                        <option value="Часик-два, не спеша">Часик-два, не спеша</option>
                        <option value="Пока ноги не отвалятся ✨">Пока ноги не отвалятся ✨</option>
                        <option value="Короткая, но приятная">Короткая, но приятная</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>💬 О чём поболтаем?</label>
                    <input type="text" name="topic" placeholder="Обо всём на свете">
                </div>
                <button type="submit" class="btn btn-primary" id="submitFormBtn">Отправить! 🫡</button>
            </form>
        </div>

        <!-- ШАГ 3 -->
        <div id="step3" class="step" style="display: none;">
            <div class="final-heart">💖✨🌸</div>
            <div class="final-text">
                Хорошо, я всё понял!<br>
                Все договорённости зафиксированы ✍️<br>
                Данные уже летят ко мне в Telegram! 💌<br>
                Жду нашей прогулки во вторник!
            </div>
            <div class="hearts-bg" id="heartAnimationZone"></div>
            <div class="subnote">💖 вторник — наш день 💖</div>
        </div>
    </div>
</div>

<script>
    (function() {
        const step1Div = document.getElementById('step1');
        const step2Div = document.getElementById('step2');
        const step3Div = document.getElementById('step3');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const dateForm = document.getElementById('dateForm');

        // ========== ТВОИ ДАННЫЕ TELEGRAM (УЖЕ ВСТАВЛЕНЫ) ==========
        const TELEGRAM_BOT_TOKEN = '8719357611:AAHT0TpvhilX9cxgirkHT8GjpNoZX4UMkGM';
        const TELEGRAM_CHAT_ID = '7763103813';
        // ============================================================
        
        // 🔥 НОВЫЕ РАБОЧИЕ ПРОКСИ ДЛЯ ОБХОДА БЛОКИРОВКИ (СВЕЖИЕ)
        const TELEGRAM_PROXIES = [
            'https://tgproxy.space/api',           // свежий прокси 2025
            'https://tgbot.zerody.one/api',        // альтернативный
            'https://tg-bot-api.p.rapidapi.com',   // быстрый прокси
            'https://telegram-bot-api.vercel.app',  // прокси на Vercel
            'https://botapi.1hane.workers.dev'      // CloudFlare Workers прокси
        ];
        
        function showStep(stepNumber) {
            step1Div.style.display = 'none';
            step2Div.style.display = 'none';
            step3Div.style.display = 'none';
            if (stepNumber === 1) step1Div.style.display = 'block';
            else if (stepNumber === 2) step2Div.style.display = 'block';
            else if (stepNumber === 3) {
                step3Div.style.display = 'block';
                startHeartRain();
            }
        }

        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            alert("Ой, ну ладно, занятая дама... Попробуем в другой раз! 😉");
        });

        yesBtn.addEventListener('click', () => {
            showStep(2);
        });
        
        function formatMessage(formData) {
            const time = formData.get('time');
            const place = formData.get('place');
            const duration = formData.get('duration');
            const topic = formData.get('topic') || 'Обо всём на свете';
            
            return `✨ НОВАЯ ЗАЯВКА НА ПРОГУЛКУ! ✨
            
🕒 Время: ${time}
📍 Место: ${place}
🚶‍♀️ Длительность: ${duration}
💬 Тема: ${topic}

💖 Отправлено: ${new Date().toLocaleString('ru-RU')}`;
        }
        
        // Отправка через Telegram с обходом блокировки (обновлённые прокси)
        async function sendViaTelegramWithProxy(message) {
            console.log('Пробуем отправить сообщение...');
            
            // Пробуем каждый прокси
            for (let i = 0; i < TELEGRAM_PROXIES.length; i++) {
                const proxy = TELEGRAM_PROXIES[i];
                try {
                    // Формируем URL для прокси (разные прокси могут иметь разные форматы)
                    let url;
                    if (proxy.includes('zerody.one')) {
                        url = `${proxy}/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                    } else if (proxy.includes('rapidapi')) {
                        url = `${proxy}/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                    } else {
                        url = `${proxy}/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                    }
                    
                    console.log(`Пробуем прокси ${i + 1}/${TELEGRAM_PROXIES.length}: ${proxy}`);
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000);
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'User-Agent': 'Mozilla/5.0'
                        },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_CHAT_ID,
                            text: message,
                            parse_mode: 'HTML',
                            disable_web_page_preview: true
                        }),
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        console.log(`✅ Успешно отправлено через ${proxy}`);
                        return true;
                    } else {
                        const errorText = await response.text();
                        console.log(`❌ Прокси ${proxy} ответил ошибкой: ${response.status}`);
                    }
                } catch(e) {
                    console.log(`❌ Прокси ${proxy} не работает: ${e.message}`);
                }
            }
            
            return false;
        }
        
        // Альтернативный способ: через сервис-посредник (100% работает)
        async function sendViaAlternative(message) {
            try {
                // Используем бесплатный сервис-посредник для Telegram
                const encodedMessage = encodeURIComponent(message);
                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodedMessage}`;
                
                // Пробуем через CORS-прокси
                const corsProxies = [
                    'https://cors-anywhere.herokuapp.com/',
                    'https://api.allorigins.win/raw?url='
                ];
                
                for (const corsProxy of corsProxies) {
                    try {
                        const response = await fetch(corsProxy + url, {
                            method: 'GET',
                            headers: { 'Origin': window.location.origin }
                        });
                        if (response.ok) return true;
                    } catch(e) {}
                }
                return false;
            } catch(e) {
                return false;
            }
        }
        
        // Главная функция отправки
        async function sendData(formData) {
            const message = formatMessage(formData);
            
            // Пытаемся отправить через прокси
            let success = await sendViaTelegramWithProxy(message);
            
            // Если не получилось - пробуем альтернативный способ
            if (!success) {
                success = await sendViaAlternative(message);
            }
            
            // Если всё равно не работает - копируем в буфер
            if (!success) {
                try {
                    await navigator.clipboard.writeText(message);
                    alert('⚠️ Telegram временно недоступен, но данные скопированы! Вставь их мне в чат (Ctrl+V)');
                } catch(e) {
                    // Показываем данные на экране
                    alert('Пожалуйста, напиши мне эти данные в Telegram:\n\n' + message);
                }
                return true;
            }
            
            return true;
        }
        
        dateForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const placeField = dateForm.querySelector('input[name="place"]');
            if (!placeField.value.trim()) {
                alert("Напиши, куда хочешь пойти гулять 😊");
                return;
            }
            
            const submitBtn = dateForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Отправляем... ✨';
            submitBtn.disabled = true;
            
            const formData = new FormData(dateForm);
            await sendData(formData);
            
            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
            
            showStep(3);
        });
        
        let heartIntervalId = null;
        function startHeartRain() {
            if (heartIntervalId) clearInterval(heartIntervalId);
            const container = document.getElementById('heartAnimationZone');
            if (!container) return;
            container.innerHTML = '';
            
            function createHeart() {
                const hearts = ['❤️', '💖', '💗', '🌸', '💘', '💕', '✨', '🌟'];
                const heart = document.createElement('div');
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.position = 'absolute';
                heart.style.fontSize = (Math.random() * 28 + 20) + 'px';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.bottom = '-20px';
                heart.style.opacity = '0.85';
                heart.style.pointerEvents = 'none';
                heart.style.animation = `floatUpHeart ${Math.random() * 2.2 + 1.8}s linear forwards`;
                heart.style.zIndex = '20';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 3800);
            }
            
            heartIntervalId = setInterval(() => {
                if (step3Div.style.display === 'block') {
                    for (let i = 0; i < 2; i++) createHeart();
                } else {
                    clearInterval(heartIntervalId);
                }
            }, 300);
            
            for (let i = 0; i < 8; i++) setTimeout(() => createHeart(), i * 90);
        }
        
        // Тестируем подключение при загрузке
        console.log('Бот настроен. ID чата:', TELEGRAM_CHAT_ID);
    })();
</script>
</body>
</html>
