<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Приглашение на прогулку | Вторник 💫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e4 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-wrapper {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255, 200, 210, 0.6);
            text-align: center;
        }

        .step {
            animation: fadeSlide 0.45s ease-out;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-size: 1.9rem;
            color: #b34e6e;
            margin-bottom: 1.2rem;
            font-weight: 650;
        }

        .greeting-text {
            font-size: 1.25rem;
            color: #b55b78;
            margin-bottom: 2rem;
            background: #fff1f4;
            display: inline-block;
            padding: 10px 24px;
            border-radius: 60px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 1.8rem 0 0.8rem;
        }

        .btn {
            border: none;
            padding: 14px 28px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-primary {
            background: #f5a9bf;
            color: white;
            box-shadow: 0 8px 18px rgba(245, 169, 191, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-danger {
            background: #e9ced6;
            color: #a55b72;
            transition: all 0.12s ease;
        }

        .btn-danger:active {
            transform: scale(0.85) !important;
            background: #e0b8c4 !important;
            opacity: 0.7;
        }

        .btn-danger:hover {
            transform: scale(0.88);
            background: #dfc0ca;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.4rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 650;
            color: #b55c7a;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 34px;
            border: 1.5px solid #ffd0de;
            background: white;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #f3a1ba;
            box-shadow: 0 0 0 3px rgba(243, 161, 186, 0.2);
        }

        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%23b85c7a" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 18px center;
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 12px;
            background: #e683a2;
            color: white;
            font-size: 1.2rem;
            padding: 14px;
            border: none;
        }

        .final-heart {
            font-size: 4rem;
            margin-bottom: 0.8rem;
            animation: gentleFloat 2s infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .final-text {
            font-size: 1.35rem;
            font-weight: 500;
            color: #b5476b;
            margin: 20px 0;
            line-height: 1.4;
        }

        .hearts-bg {
            position: relative;
            margin-top: 1rem;
            min-height: 90px;
        }

        @keyframes floatUpHeart {
            from {
                transform: translateY(0) rotate(0deg);
                opacity: 0.9;
            }
            to {
                transform: translateY(-320px) rotate(15deg);
                opacity: 0;
            }
        }

        .subnote {
            font-size: 0.7rem;
            margin-top: 20px;
            color: #cb8b9e;
        }

        @media (max-width: 550px) {
            .card {
                padding: 1.6rem;
            }
            h2 {
                font-size: 1.6rem;
            }
            .final-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="card">
        <!-- ШАГ 1 -->
        <div id="step1" class="step">
            <h2>Привет! ❤️</h2>
            <div class="greeting-text">Го гулять во вторник? 🚶‍♀️🌳</div>
            <div class="button-group">
                <button id="yesBtn" class="btn btn-primary">Да, с радостью!</button>
                <button id="noBtn" class="btn btn-danger">Нет, я не могу</button>
            </div>
            <div class="subnote">💫 Вторник — идеальный день для прогулки</div>
        </div>

        <!-- ШАГ 2 -->
        <div id="step2" class="step" style="display: none;">
            <h2>Ура! 🎉 Выбираем идеальный маршрут:</h2>
            <form id="dateForm">
                <div class="form-group">
                    <label>🕒 Удобное время</label>
                    <input type="time" name="time" value="17:00" required>
                </div>
                <div class="form-group">
                    <label>📍 Куда пойдём?</label>
                    <input type="text" name="place" placeholder="Например: парк, набережная, центр..." required>
                </div>
                <div class="form-group">
                    <label>🚶‍♀️ Длительность прогулки</label>
                    <select name="duration" required>
                        <option value="Часик-два, не спеша">Часик-два, не спеша</option>
                        <option value="Пока ноги не отвалятся ✨">Пока ноги не отвалятся ✨</option>
                        <option value="Короткая, но приятная">Короткая, но приятная</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>💬 О чём поболтаем?</label>
                    <input type="text" name="topic" placeholder="Обо всём на свете">
                </div>
                <button type="submit" class="btn btn-primary" id="submitFormBtn">Отправить! 🫡</button>
            </form>
        </div>

        <!-- ШАГ 3 -->
        <div id="step3" class="step" style="display: none;">
            <div class="final-heart">💖✨🌸</div>
            <div class="final-text">
                Хорошо, я всё понял!<br>
                Все договорённости зафиксированы ✍️<br>
                Данные уже летят ко мне! 💌<br>
                Жду нашей прогулки во вторник!
            </div>
            <div class="hearts-bg" id="heartAnimationZone"></div>
            <div class="subnote">💖 вторник — наш день 💖</div>
        </div>
    </div>
</div>

<script>
    (function() {
        const step1Div = document.getElementById('step1');
        const step2Div = document.getElementById('step2');
        const step3Div = document.getElementById('step3');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const dateForm = document.getElementById('dateForm');

        // ========== 🔥 ВСТАВЬ СВОИ ДАННЫЕ СЮДА 🔥 ==========
        // Как получить за 30 секунд:
        // 1. Открой Telegram, найди @BotFather → напиши /newbot → создай бота → получи ТОКЕН
        // 2. Найди @userinfobot → напиши /start → получи свой ID
        // 3. Вставь их ниже:
        
        const TELEGRAM_BOT_TOKEN = '8719357611:AAHT0TpvhilX9cxgirkHT8GjpNoZX4UMkGM';   // Пример: '7123456789:AAHdqTcvCH1vGWJxfSeofSAs0K5PALDsaw'
        const TELEGRAM_CHAT_ID = '7763103813';        // Пример: '123456789'
        
        // ========== ВСЁ! БОЛЬШЕ НИЧЕГО НЕ ТРОГАЙ ==========
        
        function showStep(stepNumber) {
            step1Div.style.display = 'none';
            step2Div.style.display = 'none';
            step3Div.style.display = 'none';
            if (stepNumber === 1) step1Div.style.display = 'block';
            else if (stepNumber === 2) step2Div.style.display = 'block';
            else if (stepNumber === 3) {
                step3Div.style.display = 'block';
                startHeartRain();
            }
        }

        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            alert("Ой, ну ладно, занятая дама... Попробуем в другой раз! 😉");
        });

        yesBtn.addEventListener('click', () => {
            showStep(2);
        });

        async function sendToTelegram(formData) {
            const time = formData.get('time');
            const place = formData.get('place');
            const duration = formData.get('duration');
            const topic = formData.get('topic') || 'Обо всём на свете';
            
            const message = `✨ НОВАЯ ЗАЯВКА НА ПРОГУЛКУ! ✨
            
🕒 Время: ${time}
📍 Место: ${place}
🚶‍♀️ Длительность: ${duration}
💬 Тема: ${topic}

💖 Отправлено: ${new Date().toLocaleString('ru-RU')}`;
            
            // Проверяем, вставил ли пользователь реальные данные
            if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN === '8719357611:AAHT0TpvhilX9cxgirkHT8GjpNoZX4UMkGM' || 
                !TELEGRAM_CHAT_ID || TELEGRAM_CHAT_ID === '7763103813') {
                // Если не настроил — копируем в буфер
                await navigator.clipboard.writeText(message);
                alert('📋 Настрой Telegram бота (инструкция выше), пока данные скопированы! Вставь их себе в заметки.');
                return true;
            }
            
            try {
                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                
                if (response.ok) {
                    return true;
                } else {
                    const error = await response.json();
                    console.error('Telegram error:', error);
                    alert('Ошибка: проверь токен и ID (скопируй их точно без пробелов)');
                    return false;
                }
            } catch(e) {
                console.error('Network error:', e);
                alert('Ошибка соединения, но данные скопированы в буфер!');
                await navigator.clipboard.writeText(message);
                return true;
            }
        }
        
        dateForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const placeField = dateForm.querySelector('input[name="place"]');
            if (!placeField.value.trim()) {
                alert("Напиши, куда хочешь пойти гулять 😊");
                return;
            }
            
            const submitBtn = dateForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Отправляем... ✨';
            submitBtn.disabled = true;
            
            const formData = new FormData(dateForm);
            const success = await sendToTelegram(formData);
            
            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
            
            showStep(3);
        });
        
        let heartIntervalId = null;
        function startHeartRain() {
            if (heartIntervalId) clearInterval(heartIntervalId);
            const container = document.getElementById('heartAnimationZone');
            if (!container) return;
            container.innerHTML = '';
            
            function createHeart() {
                const hearts = ['❤️', '💖', '💗', '🌸', '💘', '💕', '✨', '🌟'];
                const heart = document.createElement('div');
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.position = 'absolute';
                heart.style.fontSize = (Math.random() * 28 + 20) + 'px';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.bottom = '-20px';
                heart.style.opacity = '0.85';
                heart.style.pointerEvents = 'none';
                heart.style.animation = `floatUpHeart ${Math.random() * 2.2 + 1.8}s linear forwards`;
                heart.style.zIndex = '20';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 3800);
            }
            
            heartIntervalId = setInterval(() => {
                if (step3Div.style.display === 'block') {
                    for (let i = 0; i < 2; i++) createHeart();
                } else {
                    clearInterval(heartIntervalId);
                }
            }, 300);
            
            for (let i = 0; i < 8; i++) setTimeout(() => createHeart(), i * 90);
        }
    })();
</script>

<!-- 
    ═══════════════════════════════════════════════════════════════════
    🚀 КАК НАСТРОИТЬ TELEGRAM БОТА (ЗА 1 МИНУТУ)
    ═══════════════════════════════════════════════════════════════════
    
    ШАГ 1: Получить ТОКЕН бота
    ──────────────────────────
    → Открой Telegram
    → Найди @BotFather (в поиске)
    → Напиши ему: /newbot
    → Придумай имя боту (например: "Мой бот для прогулок")
    → Придумай username (должен заканчиваться на _bot, например: my_walk_bot)
    → BotFather даст тебе ТОКЕН, выглядит так: 7123456789:AAHdqTcvCH1vGWJxfSeofSAs0K5PALDsaw
    → Скопируй этот ТОКЕН
    
    ШАГ 2: Получить свой ID
    ───────────────────────
    → Найди @userinfobot
    → Напиши ему: /start
    → Он ответит: "Your user ID: 123456789"
    → Скопируй эту цифру (ID)
    
    ШАГ 3: Вставить в код
    ─────────────────────
    → Найди в коде строчки:
        const TELEGRAM_BOT_TOKEN = 'ВСТАВЬ_СВОЙ_ТОКЕН_СЮДА';
        const TELEGRAM_CHAT_ID = 'ВСТАВЬ_СВОЙ_ID_СЮДА';
    → Замени текст в кавычках на свои значения
    
    ВСЁ! Теперь когда девушка отправит форму — 
    тебе сразу прилетит сообщение в Telegram! 💌
    
    ═══════════════════════════════════════════════════════════════════
    ЕСЛИ НЕ ХОЧЕШЬ TELEGRAM — НИЧЕГО НЕ НАСТРАИВАЙ!
    ═══════════════════════════════════════════════════════════════════
    
    Если оставить поля пустыми, данные скопируются в буфер обмена,
    и девушка сама сможет вставить их тебе в чат.
    
    Это 100% работает без регистраций!
    
    ═══════════════════════════════════════════════════════════════════
-->
</body>
</html>
