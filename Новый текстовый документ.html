<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Приглашение на прогулку | Вторник 💫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e4 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-wrapper {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255, 200, 210, 0.6);
            text-align: center;
        }

        .step {
            animation: fadeSlide 0.45s ease-out;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-size: 1.9rem;
            color: #b34e6e;
            margin-bottom: 1.2rem;
            font-weight: 650;
        }

        .greeting-text {
            font-size: 1.25rem;
            color: #b55b78;
            margin-bottom: 2rem;
            background: #fff1f4;
            display: inline-block;
            padding: 10px 24px;
            border-radius: 60px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 1.8rem 0 0.8rem;
        }

        .btn {
            border: none;
            padding: 14px 28px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-primary {
            background: #f5a9bf;
            color: white;
            box-shadow: 0 8px 18px rgba(245, 169, 191, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-danger {
            background: #e9ced6;
            color: #a55b72;
            transition: all 0.12s ease;
        }

        .btn-danger:active {
            transform: scale(0.85) !important;
            background: #e0b8c4 !important;
            opacity: 0.7;
        }

        .btn-danger:hover {
            transform: scale(0.88);
            background: #dfc0ca;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.4rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 650;
            color: #b55c7a;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 34px;
            border: 1.5px solid #ffd0de;
            background: white;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #f3a1ba;
            box-shadow: 0 0 0 3px rgba(243, 161, 186, 0.2);
        }

        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%23b85c7a" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 18px center;
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 12px;
            background: #e683a2;
            color: white;
            font-size: 1.2rem;
            padding: 14px;
            border: none;
        }

        .final-heart {
            font-size: 4rem;
            margin-bottom: 0.8rem;
            animation: gentleFloat 2s infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .final-text {
            font-size: 1.35rem;
            font-weight: 500;
            color: #b5476b;
            margin: 20px 0;
            line-height: 1.4;
        }

        .hearts-bg {
            position: relative;
            margin-top: 1rem;
            min-height: 90px;
        }

        @keyframes floatUpHeart {
            from {
                transform: translateY(0) rotate(0deg);
                opacity: 0.9;
            }
            to {
                transform: translateY(-320px) rotate(15deg);
                opacity: 0;
            }
        }

        .subnote {
            font-size: 0.7rem;
            margin-top: 20px;
            color: #cb8b9e;
        }

        @media (max-width: 550px) {
            .card {
                padding: 1.6rem;
            }
            h2 {
                font-size: 1.6rem;
            }
            .final-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="card">
        <!-- ШАГ 1 -->
        <div id="step1" class="step">
            <h2>Привет! ❤️</h2>
            <div class="greeting-text">Го гулять во вторник? 🚶‍♀️🌳</div>
            <div class="button-group">
                <button id="yesBtn" class="btn btn-primary">Да, с радостью!</button>
                <button id="noBtn" class="btn btn-danger">Нет, я не могу</button>
            </div>
            <div class="subnote">💫 Вторник — идеальный день для прогулки</div>
        </div>

        <!-- ШАГ 2: Анкета -->
        <div id="step2" class="step" style="display: none;">
            <h2>Ура! 🎉 Выбираем идеальный маршрут:</h2>
            <form id="dateForm">
                <div class="form-group">
                    <label>🕒 Удобное время</label>
                    <input type="time" name="time" value="17:00" required>
                </div>
                <div class="form-group">
                    <label>📍 Куда пойдём?</label>
                    <input type="text" name="place" placeholder="Например: парк, набережная, центр..." required>
                </div>
                <div class="form-group">
                    <label>🚶‍♀️ Длительность прогулки</label>
                    <select name="duration" required>
                        <option value="Часик-два, не спеша">Часик-два, не спеша</option>
                        <option value="Пока ноги не отвалятся ✨">Пока ноги не отвалятся ✨</option>
                        <option value="Короткая, но приятная">Короткая, но приятная</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>💬 О чём поболтаем?</label>
                    <input type="text" name="topic" placeholder="Обо всём на свете">
                </div>
                <button type="submit" class="btn btn-primary" id="submitFormBtn">Отправить! 🫡</button>
            </form>
        </div>

        <!-- ШАГ 3: Финал -->
        <div id="step3" class="step" style="display: none;">
            <div class="final-heart">💖✨🌸</div>
            <div class="final-text">
                Хорошо, я всё понял!<br>
                Все договорённости зафиксированы ✍️<br>
                Данные уже у меня! 💌<br>
                Жду нашей прогулки во вторник!
            </div>
            <div class="hearts-bg" id="heartAnimationZone"></div>
            <div class="subnote">💖 вторник — наш день 💖</div>
        </div>
    </div>
</div>

<script>
    (function() {
        const step1Div = document.getElementById('step1');
        const step2Div = document.getElementById('step2');
        const step3Div = document.getElementById('step3');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const dateForm = document.getElementById('dateForm');

        function showStep(stepNumber) {
            step1Div.style.display = 'none';
            step2Div.style.display = 'none';
            step3Div.style.display = 'none';
            if (stepNumber === 1) step1Div.style.display = 'block';
            else if (stepNumber === 2) step2Div.style.display = 'block';
            else if (stepNumber === 3) {
                step3Div.style.display = 'block';
                startHeartRain();
            }
        }

        // Кнопка "НЕТ" — уменьшается + alert
        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            alert("Ой, ну ладно, занятая дама... Попробуем в другой раз! 😉");
        });

        // Да — переходим к анкете
        yesBtn.addEventListener('click', () => {
            showStep(2);
        });

        // ⚡⚡⚡ САМЫЙ ПРОСТОЙ СПОСОБ: ОТПРАВКА В TELEGRAM (работает сразу, без регистрации) ⚡⚡⚡
        // Просто замени ID чата и токен бота (создать бота за 2 минуты)
        // НО даже если не хочешь бота — есть второй вариант: копирование в буфер обмена
        
        // 👇 ТВОЙ TELEGRAM БОТ (создаётся за 1 минуту)
        // КАК СОЗДАТЬ: Напиши @BotFather в Telegram → /newbot → придумай имя → получишь токен
        // Затем узнай свой ID: напиши @userinfobot → получишь ID
        const TELEGRAM_BOT_TOKEN = '';  // Вставь сюда токен, например: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
        const TELEGRAM_CHAT_ID = '';     // Вставь свой ID, например: "123456789"
        
        // ВАРИАНТ 2: ЕСЛИ НЕ ХОЧЕШЬ ТЕЛЕГРАМ — ДАННЫЕ СКОПИРУЮТСЯ В БУФЕР (ты вставишь себе в заметки)
        // Это работает сразу и без ничего!
        
        async function sendDataToYou(formData) {
            const time = formData.get('time');
            const place = formData.get('place');
            const duration = formData.get('duration');
            const topic = formData.get('topic') || 'Обо всём на свете';
            
            const message = `✨ НОВАЯ ЗАЯВКА НА ПРОГУЛКУ! ✨
            
🕒 Время: ${time}
📍 Место: ${place}
🚶‍♀️ Длительность: ${duration}
💬 Тема: ${topic}

💖 От: ${new Date().toLocaleString('ru-RU')}`;
            
            // Если заполнен Telegram — шлём туда
            if (TELEGRAM_BOT_TOKEN && TELEGRAM_CHAT_ID) {
                try {
                    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_CHAT_ID,
                            text: message,
                            parse_mode: 'HTML'
                        })
                    });
                    return response.ok;
                } catch(e) {
                    console.error('Telegram error:', e);
                    return false;
                }
            } 
            // Иначе — копируем в буфер обмена и показываем данные (надёжно и просто)
            else {
                // Копируем в буфер
                await navigator.clipboard.writeText(message);
                alert('📋 Данные скопированы в буфер! Вставь их себе в заметки (Ctrl+V)');
                return true;
            }
        }
        
        // Отправка формы
        dateForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const placeField = dateForm.querySelector('input[name="place"]');
            if (!placeField.value.trim()) {
                alert("Напиши, куда хочешь пойти гулять 😊");
                return;
            }
            
            const submitBtn = dateForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Отправляем... ✨';
            submitBtn.disabled = true;
            
            const formData = new FormData(dateForm);
            const success = await sendDataToYou(formData);
            
            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
            
            if (success) {
                showStep(3);
            } else {
                alert('Не отчаивайся! Просто скажи мне устно 😊');
                showStep(3);
            }
        });
        
        // Сердечки
        let heartIntervalId = null;
        function startHeartRain() {
            if (heartIntervalId) clearInterval(heartIntervalId);
            const container = document.getElementById('heartAnimationZone');
            if (!container) return;
            container.innerHTML = '';
            
            function createHeart() {
                const hearts = ['❤️', '💖', '💗', '🌸', '💘', '💕', '✨', '🌟'];
                const heart = document.createElement('div');
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.position = 'absolute';
                heart.style.fontSize = (Math.random() * 28 + 20) + 'px';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.bottom = '-20px';
                heart.style.opacity = '0.85';
                heart.style.pointerEvents = 'none';
                heart.style.animation = `floatUpHeart ${Math.random() * 2.2 + 1.8}s linear forwards`;
                heart.style.zIndex = '20';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 3800);
            }
            
            heartIntervalId = setInterval(() => {
                if (step3Div.style.display === 'block') {
                    for (let i = 0; i < 2; i++) createHeart();
                } else {
                    clearInterval(heartIntervalId);
                }
            }, 300);
            
            for (let i = 0; i < 8; i++) setTimeout(() => createHeart(), i * 90);
        }
    })();
</script>

    ─────────────────────────────────
    Когда девушка нажмёт "Отправить", данные автоматически СКОПИРУЮТСЯ 
    в её буфер обмена. Она просто вставит их в чат (Ctrl+V) и отправит тебе.
    
    Это 100% работает без ожидания верификаций и регистраций!

    2. Придумай имя боту → получишь токен (например: 123456:ABCdefGHI)
    3. Найди @userinfobot → напиши /start → получишь свой ID (например: 987654321)
    4. Вставь их в код выше (строчки TELEGRAM_BOT_TOKEN и TELEGRAM_CHAT_ID)
    
    → После этого все ответы будут лететь тебе в Telegram мгновенно!
    
    📌 Если не хочешь Telegram — ничего не делай! Данные скопируются в буфер,
       и девушка сама тебе их перешлёт. Это надёжно и работает сразу.

</body>
</html>
